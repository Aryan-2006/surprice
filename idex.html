<!DOCTYPE<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
  :root {
    --primary-red: #ff2d2d;
    --dark-red: #b30000;
    --camera-teal: #e0f2f1;
    --glass: rgba(255, 255, 255, 0.2);
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--primary-red);
    color: white;
    overflow-x: hidden;
  }

  /* --- SCREEN 1: LOCK SCREEN --- */
  #lockScreen {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    transition: opacity 0.6s ease;
    padding: 20px;
    box-sizing: border-box;
  }

  @media (max-width: 768px) {
    #lockScreen { flex-direction: column; gap: 30px; text-align: center; }
  }

  .sticker {
    z-index: 10;
    position: absolute;
    width: 100px;
    top: 20px;
    left: 20px;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 10px white);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }

  .left-image { width: 250px; transform: rotate(-3deg); }
  .left-image img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 5px solid white;
  }

  .passcode-container {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    text-align: center;
  }

  .passcode-display { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .passcode-display input {
    width: 45px; height: 45px; text-align: center;
    font-size: 24px; border-radius: 10px; border: none; color: #333;
    background: white; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
  }

  .keypad { display: grid; grid-template-columns: repeat(3, 65px); gap: 12px; }
  .key {
    background: white; color: var(--primary-red);
    font-weight: bold; border-radius: 50%; height: 65px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.2s; font-size: 1.2rem;
    box-shadow: 0 4px 0px #d6d6d6;
  }
  .key:active { transform: translateY(2px); box-shadow: 0 2px 0px #d6d6d6; }

  /* --- FLASH EFFECT --- */
  .flash-effect {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: white; opacity: 0; z-index: 200; pointer-events: none;
  }
  .flash-active { animation: flashAnim 0.6s ease-out; }
  @keyframes flashAnim { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; } }

  /* --- SCREEN 2: LOVE REVEAL JOURNEY --- */
  .love-screen {
    background: linear-gradient(to bottom, var(--primary-red), var(--dark-red));
    min-height: 100vh;
    display: none; /* Shown by JS */
    overflow-y: auto;
  }

  .camera-section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .instax-body {
    width: 240px; height: 210px; background: var(--camera-teal);
    border-radius: 35px; position: relative; border: 5px solid #fff;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 5;
  }

  .lens {
    width: 110px; height: 110px; background: #222; border-radius: 50%;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    border: 10px solid #b2dfdb;
  }

  .photo-slot {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 170px; height: 0; overflow: visible;
  }

  .printed-photo {
    width: 170px; background: white; padding: 12px 12px 35px 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0;
  }

  .print-animation { animation: printOut 3s ease-out forwards; animation-delay: 0.5s; }

  @keyframes printOut {
    0% { transform: translateY(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-240px); opacity: 1; }
  }

  .printed-photo img { width: 100%; height: 160px; object-fit: cover; }
  .photo-date { color: #444; font-family: 'Courier New', monospace; font-size: 12px; text-align: center; margin-top: 10px; }

  .love-title { margin-top: 200px; font-size: 2rem; text-align: center; padding: 0 10px; }
  .hint-down { margin-top: 10px; animation: bounce 2s infinite; font-size: 2rem; }

  /* COLLAGE SECTION */
  .collage-section { padding: 80px 20px; text-align: center; }
  .collage-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 15px; max-width: 600px; margin: 40px auto;
  }
  .collage-img {
    width: 100%; border-radius: 12px; border: 5px solid white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3); transform: rotate(calc(var(--r) * 1deg));
    transition: 0.3s;
  }
  .collage-img:hover { transform: scale(1.05) rotate(0deg); z-index: 10; }

  /* FINAL MESSAGE */
  .final-message {
    min-height: 80vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    padding: 40px 20px;
  }
  .big-love { font-size: 4rem; text-shadow: 0 0 20px white; animation: beat 1.2s infinite; margin: 20px 0; }

  .next-btn {
    margin-top: 30px; padding: 15px 40px; border-radius: 50px;
    border: none; background: white; color: var(--primary-red);
    font-weight: bold; font-size: 1.1rem; cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
  }
  .next-btn:hover { background: #ffebeb; transform: scale(1.05); }

  /* CANVA CONTAINER */
  #canvaContainer { padding: 40px 10px; width: 100%; max-width: 900px; margin: 0 auto; }

  /* GLOBAL ANIMATIONS */
  @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
  .hidden { display: none !important; }
  .shake { animation: shakeAnim 0.4s; }
  @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
</style>
</head>

<body>

  <div id="flash" class="flash-effect"></div>

  <div id="lockScreen">
    <img class="sticker" src="6700_1_06.jpg" alt="sticker"> <div class="left-image">
      <img src="img.png" alt="Couple Photo">
    </div>

    <div class="passcode-container" id="passcodePanel">
      <h2 style="margin-top:0;">Hello, My Love ❤️</h2>
      <p style="opacity:0.8; font-size: 14px;">Hint: Our special date 📅</p>

      <div class="passcode-display">
        <input type="password" maxlength="1" readonly>
        <input type="password" maxlength="1" readonly>
        <input type="password" maxlength="1" readonly>
        <input type="password" maxlength="1" readonly>
      </div>

      <div class="keypad">
        <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
        <div></div><div class="key" onclick="press(0)">0</div><div class="key" onclick="clearCode()">⌫</div>
      </div>
    </div>
  </div>

  <div class="love-screen" id="loveScreen">

    <div class="camera-section">
      <div class="instax-body">
        <div class="lens"></div>
        <div class="photo-slot">
          <div class="printed-photo" id="photoToPrint">
            <img src="img2.jpeg" alt="Polaroid">
            <div class="photo-date">April 24, 2026 ❤️</div>
          </div>
        </div>
      </div>
      <h1 class="love-title">Captured in My Heart...</h1>
      <div class="hint-down">⬇️</div>
    </div>

    <div class="collage-section">
      <h2>A Few of My Favorites... ✨</h2>
      <div class="collage-grid">
        <img src="img3.jpeg" class="collage-img" style="--r: -5" alt="Mem 1">
        <img src="img4.jpeg" class="collage-img" style="--r: 5" alt="Mem 2">
        <img src="img5.jpeg" class="collage-img" style="--r: -3" alt="Mem 3">
        <img src="img6.jpeg" class="collage-img" style="--r: 4" alt="Mem 4">
      </div>
    </div>

    <div class="final-message" id="finalMessage">
      <h1 class="big-love">I LOVE YOU</h1>
      <p style="font-size: 1.3rem;">You are my world.</p>
      <button class="next-btn" onclick="showCanva()">Open Scrapbook ➔</button>
    </div>

    <div id="canvaContainer" class="hidden">
      <div style="position: relative; width: 100%; height: 0; padding-top: 56.25%; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <iframe loading="lazy"
                style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none;"
                src="https://www.canva.com/design/DAHHwen1iBQ/ENbFQ32SIP8VGCth75-RkA/view?embed"
                allowfullscreen="allowfullscreen">
        </iframe>
      </div>
      <p style="text-align: center; margin-top: 25px; font-family: 'Courier New', monospace;">Made with ❤️ by Aryan N</p>
    </div>

  </div>

  <audio id="bgMusic" loop>
    <source src="audio.mpeg" type="audio/mpeg">
  </audio>

<script>
  let code = "";
  const correct = "0401"; // <--- CHANGE YOUR PASSCODE HERE
  const inputs = document.querySelectorAll(".passcode-display input");
  const music = document.getElementById("bgMusic");

  function press(num) {
    if (code.length < 4) {
      code += num;
      inputs[code.length - 1].value = "•";
      if (code.length === 4) setTimeout(verify, 250);
    }
  }

  function verify() {
    if (code === correct) {
      // 1. Shutter Flash Effect
      document.getElementById('flash').classList.add('flash-active');

      // 2. Play Audio
      music.play().catch(e => console.log("Audio block:", e));

      // 3. Reveal the Love Journey
      setTimeout(() => {
        document.getElementById("lockScreen").classList.add("hidden");
        document.getElementById("loveScreen").style.display = "block";

        // 4. Start the Instax Print Animation
        setTimeout(() => {
          document.getElementById("photoToPrint").classList.add("print-animation");
        }, 300);
      }, 300);

    } else {
      // Wrong Code - Shake Animation
      const panel = document.getElementById("passcodePanel");
      panel.classList.add("shake");
      setTimeout(() => {
        panel.classList.remove("shake");
        clearCode();
      }, 400);
    }
  }

  function clearCode() {
    code = "";
    inputs.forEach(i => i.value = "");
  }

  function showCanva() {
    const message = document.getElementById("finalMessage");
    const container = document.getElementById("canvaContainer");

    message.style.display = "none";
    container.classList.remove("hidden");

    // Smooth scroll to the WOW design
    window.scrollTo({
      top: container.offsetTop,
      behavior: 'smooth'
    });
  }
</script>

</body>
</html>
